<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>妈咪厨房 v4.1 - 餐次图标预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    .phone-frame {
      width: 390px;
      height: 844px;
      border-radius: 44px;
      border: 8px solid #2a2a3e;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,255,255,0.1);
      position: relative;
      background: #000;
    }
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 28px;
      background: #2a2a3e;
      border-radius: 0 0 18px 18px;
      z-index: 9999;
    }
    .phone-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }
    .label {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    .version-tag {
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      margin-top: 16px;
    }
    @media (max-width: 430px) {
      .phone-frame {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
        border: none;
        box-shadow: none;
      }
      .phone-frame::before { display: none; }
      .label, .version-tag { display: none; }
      body { background: #000; }
    }
  </style>
</head>
<body>
  <div class="label">妈咪厨房 v4.1 · 餐次图标预览</div>
  <div class="phone-frame">
    <iframe src="v41.html" allowfullscreen></iframe>
  </div>
  <div class="version-tag">iPhone 14 · 390 × 844</div>
</body>
</html>
