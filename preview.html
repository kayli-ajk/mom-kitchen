<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>妈咪厨房 - 手机预览</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #fff5f7 0%, #ffe8f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(255, 107, 149, 0.15);
      text-align: center;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      color: #e84393;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: #999;
      margin-bottom: 32px;
    }
    .version-label {
      display: inline-block;
      background: #fff0f5;
      color: #e84393;
      border: 1px solid #ffc0d9;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 14px;
      margin-bottom: 24px;
    }
    .qr-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    #qrcode {
      padding: 12px;
      background: white;
      border-radius: 16px;
      border: 2px solid #ffe0ed;
      display: inline-block;
    }
    .tip {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .tip strong { color: #e84393; }
    .url-box {
      background: #fff8fb;
      border: 1px solid #ffd0e5;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: #666;
      word-break: break-all;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .open-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff7bac, #e84393);
      color: white;
      font-size: 16px;
      font-weight: 600;
      border-radius: 14px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(232, 67, 147, 0.3);
    }
    .open-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(232, 67, 147, 0.4);
    }
    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🍳</div>
    <div class="title">妈咪厨房</div>
    <div class="subtitle">孕期 · 产后 · 宝宝辅食推荐</div>
    <div class="version-label">v4.0 20260518 温馨清新治愈风</div>

    <div class="qr-wrapper">
      <div id="qrcode"></div>
    </div>

    <p class="tip">用手机扫描上方二维码，<br>或直接在手机浏览器访问下方地址：</p>

    <div class="url-box" id="urlDisplay">正在获取地址...</div>

    <a class="open-btn" id="openBtn" href="#" target="_blank">在浏览器中打开</a>

    <p class="note">⚠️ 需与手机在同一 Wi-Fi 网络下</p>
  </div>

  <script>
    const ip = '192.168.31.132';
    const port = '8899';
    const file = encodeURIComponent('妈咪厨房_v4.0_20260518.html');
    const url = `http://${ip}:${port}/${file}`;

    document.getElementById('urlDisplay').textContent = decodeURIComponent(url);
    document.getElementById('openBtn').href = url;

    new QRCode(document.getElementById('qrcode'), {
      text: url,
      width: 200,
      height: 200,
      colorDark: '#e84393',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>
</body>
</html>
